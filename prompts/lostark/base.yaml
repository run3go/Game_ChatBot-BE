sql_basics: |
  - 테이블 접두사는 lostark.를 사용한다.
  - JOIN 시 컬럼은 반드시 테이블 alias를 명시한다.
  - 동점자 포함 상위 N개 추출 시: ORDER BY ... DESC FROM FIRST 1 ROWS WITH TIES 사용한다.
  - 교집합 없는 데이터 추출 시: NOT EXISTS 사용.
  - 여러 통계와 리스트 동시 추출 시: JOIN 대신 상호관련 서브쿼리 사용 권장.
  - [LIMIT 필수] 모든 SELECT에는 LIMIT을 명시하라. 포맷별 기준은 [FORMAT] 섹션 참고.
    단, COUNT(*) 또는 집계 함수만 반환하는 쿼리(단일 행)는 LIMIT 생략 가능.

dynamic_table_rules: |
  - [단일 최신화] collected_at 존재 테이블 조회 시, WITH step00 AS (SELECT MAX(collected_at) ... WHERE character_name = '...') 패턴 필수.
  - [전체 집계] character_name별 MAX(collected_at)를 구한 뒤 조인하여 최신 스냅샷만 필터링.
  - [다중 조인] collected_at이 있는 테이블을 2개 이상 조인할 때, 테이블마다 별도 CTE로 최신 시점을 구한 뒤 메인에서 조인하라.
    ⚠️ 카테고리가 다른 동적 테이블(예: MARKET 쿼리에서 armory_engravings_tb 조인)도 동일하게 적용. 예외 없음.
      WITH latest_a AS (SELECT MAX(collected_at) AS max_at FROM lostark.table_a WHERE character_name = '{닉네임}'),
           latest_b AS (SELECT MAX(collected_at) AS max_at FROM lostark.table_b WHERE character_name = '{닉네임}')
      SELECT ... FROM lostark.table_a a
      JOIN lostark.table_b b ON b.character_name = a.character_name
      WHERE a.collected_at = (SELECT max_at FROM latest_a)
        AND b.collected_at = (SELECT max_at FROM latest_b)
  - [시점 비교] "어제", "이전" 비교 시 `SELECT DISTINCT collected_at ORDER BY 1 DESC LIMIT 2`로 실제 시점 2개 추출.

syntax_rules: |
  - [JSONB 캐스팅] (options->>'옵션명')::numeric 형식 준수. 반드시 괄호로 감싸고 캐스팅할 것.
  - [정규식] 대괄호 추출 시 반드시 '\[(.*?)\]' 패턴 사용 (* 누락 금지).
  - [서수 비교] '중 이하' -> IN ('없음', '하', '중'), '중 이상' -> IN ('중', '중상', '상', '최상').
