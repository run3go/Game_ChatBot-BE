category_name: "AUCTION"

rules: |
  - buy_price > 0 (즉시구매가 존재) 조건 포함.
  - 장신구(반지/귀걸이/목걸이/팔찌) 조회 시 "3티어" 언급 없으면 반드시 tier = 4 고정.
  - [캐릭터가 장착한 보석의 시세] armory_gem_tb의 name에 '광휘'가 포함된 경우, effect_type_name이 '재사용 대기시간 감소'라면 '작열', '피해 증가'라면 '겁화'로 치환.
  - [캐릭터가 장착한 악세사리(반지, 귀걸이, 목걸이)의 시세] armory_equipment_tb에서 아이템의 옵션·품질을 추출한 뒤, 그 값을 기준으로 auction_items_tb에서 유사 매물을 검색.

  - [보석 조회]
    - [레벨] 보석 레벨은 반드시 `name LIKE '%N레벨%'` 패턴을 사용해. grade나 level 컬럼에 레벨 숫자를 넣는 것은 금지.
    - [등급 필터] `grade` 컬럼은 아이템 희귀도(고대/유물/전설)를 의미. 질문에 '고대', '유물' 등의 등급 명시가 없다면 `grade` 조건은 생략해.
    - [종류 미지정 시 집계] 겁화/작열 등 종류를 명시하지 않고 레벨/티어만 물을 경우, 반드시 `GROUP BY A.name`을 적용하여 보석 종류별로 결과를 반환하라.
      * SELECT 절 필수 포함: A.name, MIN(A.buy_price) AS min_price, ROUND(AVG(A.buy_price)) AS avg_price, COUNT(A.id) AS item_count

  - [장신구 SELECT 필수 컬럼] 반지/귀걸이/목걸이 조회 시 SELECT 절에 A.name, A.quality, A.buy_price, A.options를 예외 없이 포함할 것.

  - [데이터 정제]
    - auction_items_tb 조회 시 반드시 `A.end_date > CURRENT_TIMESTAMP`를 포함하여 만료된 매물을 제외할 것.
    - 장신구 옵션 키 조회 시, Few-shot에 정의된 공백이 포함된 키 명칭(예: '공격력  %')을 우선적으로 사용할 것.

  - [팔찌 특이사항]
    - 팔찌(Bracelet) 조회 시 품질(quality) 필터는 절대 사용하지 않으며, 오직 옵션 수치로만 검색할 것.

  - [슬롯 중복 처리]
    - 반지(Ring)와 귀걸이(Earring)는 2개씩 장착하므로, `DISTINCT ON (slot_index)`를 사용하여 슬롯별로 데이터를 분리하여 처리할 것.

  - [수치 구간화]
    - 유저가 '상/중/하' 옵션을 언급할 경우, 직접적인 '=' 매칭 대신 `(options->>...)::numeric >= [최소수치]` 형태의 하한선 필터를 사용할 것.

  - [특수 용어: 상단일]
    - '상단일'은 해당 부위의 핵심 옵션 2개 중 하나가 '상' 등급인 매물을 의미함.
    - '딜러 목걸이 상단일' 요청 시: (추가 피해 >= 2.6) OR (적에게 주는 피해 증가 >= 2.0)
    - '서폿 귀걸이 상단일' 요청 시: (무기 공격력 >= 195) OR (무기 공격력 % >= 3.0)
    - 유저가 특정 옵션을 집어서 "무공 상단일"이라고 하면 해당 옵션만 '상' 수치로 필터링할 것.
