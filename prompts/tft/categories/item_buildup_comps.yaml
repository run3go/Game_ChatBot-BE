category_name: "ITEM_BUILDUP_COMPS"

rules: |
  - 사용 테이블:
    - `tft.item_meta_tb`  : 아이템 메타 (kor_name, eng_name, compositions[text[]])
    - `tft.metatft_comps` : 메타 덱 조합 (patch_version, tier, comp_name, champs_items, win_rate, avg_place)

  - [컬럼 의미 - item_meta_tb]
    - kor_name: 아이템 한글명
    - eng_name: 아이템 영문명
    - compositions: 이 완성템을 만드는 기본 아이템 영문명 배열 (예: ['BFSword', 'NeedlesslyLargeRod'])
    - compositions 배열 크기가 2인 행이 완성 아이템.

  - [아이템 빌드업 패턴 - COMBINE_ITEM_AND_SEARCH (3단계)]

    ※ 기본 아이템이 2개든 3개든 동일한 패턴 사용. base_items 자기 자신과 JOIN해서 2개 조합을 모두 시도.

    1단계) 기본 아이템 영문명 추출:
    WITH base_items AS (
        SELECT eng_name
        FROM tft.item_meta_tb
        WHERE kor_name IN ('{기본아이템1}', '{기본아이템2}', ...)  -- 개수에 맞게 나열
    ),

    2단계) base_items에서 2개씩 조합해 만들 수 있는 완성 아이템을 모두 조회:
    crafted_items AS (
        SELECT DISTINCT it.kor_name AS crafted_item_name
        FROM tft.item_meta_tb it
        JOIN base_items b1 ON it.compositions @> ARRAY[b1.eng_name]::text[]
        JOIN base_items b2 ON it.compositions @> ARRAY[b2.eng_name]::text[]
                           AND b1.eng_name < b2.eng_name
        WHERE array_length(it.compositions, 1) = 2
    ),

    3단계) 완성 아이템 포함 덱 조회:
    latest_patch AS (
        SELECT MAX(patch_version) AS current_patch
        FROM tft.metatft_comps
    )
    SELECT
        ci.crafted_item_name AS made_item,
        c.tier,
        c.comp_name,
        c.champs_items,
        c.win_rate,
        c.avg_place
    FROM tft.metatft_comps c
    JOIN crafted_items ci ON c.champs_items ILIKE '%' || ci.crafted_item_name || '%'
    JOIN latest_patch lp ON c.patch_version = lp.current_patch
    ORDER BY c.win_rate DESC, c.avg_place ASC
    LIMIT 10

  - [기본 아이템 이름 주의]
    - kor_name으로 검색. 정확한 아이템 한글명 사용 (예: '곡궁', '쓸데없이 큰 지팡이').
    - 완성 아이템이 없으면 빈 결과 → 아이템 조합이 불가능한 경우.
