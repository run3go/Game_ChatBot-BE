category_name: "META_SYNERGY"

rules: |
  - 사용 테이블:
    - `tft.match_participant_info_tb`  : 참가자 정보 (match_user_id, placement)
    - `tft.match_participant_trait_tb` : 참가자별 활성화된 시너지 (match_user_id, trait_name, tier_current)
    - `tft.trait_meta_tb`              : 시너지 메타 (eng_name, kor_name, season)

  - [시너지 이름 정규화]
    - trait_name은 'TFT17_DarkStar' 형태이므로 접두사 제거 필요:
      regexp_replace(tr.trait_name, '^TFT[0-9]+_?', '')
    - trait_meta_tb와 LEFT JOIN 시 eng_name을 lower()로 비교.
    - 한글명 없으면 COALESCE로 정규화된 영문명 폴백.

    매치 데이터는 전체 기간 기준으로 집계하며, 날짜 필터가 필요하면 별도 날짜 컬럼을 사용할 것.

  - [집계 기준 해석]
    - "승률", "1등 많이 하는", "잘 이기는" 등 → WHERE p.placement = 1, COUNT(*) AS first_place_games
    - "순방", "순방율", "4등 이내", "상위권" 등  → WHERE p.placement <= 4, COUNT(*) AS top4_games
    - 비율(횟수/전체) 계산 불필요. 각 조건의 COUNT(*) 집계 후 DESC 정렬.

  - [활성화 시너지 필터]
    - tier_current >= 1 조건으로 실제 활성화된 시너지만 집계.

  - [1등 횟수 집계 패턴]
    SELECT
        COALESCE(tm.kor_name, regexp_replace(tr.trait_name, '^TFT[0-9]+_?', '')) AS synergy,
        COUNT(*) AS first_place_games
    FROM tft.match_participant_info_tb p
    JOIN tft.match_participant_trait_tb tr ON p.match_user_id = tr.match_user_id
    LEFT JOIN tft.trait_meta_tb tm
        ON tm.season = 'set17'
       AND lower(tm.eng_name) = lower(regexp_replace(tr.trait_name, '^TFT[0-9]+_?', ''))
    WHERE p.placement = 1
      AND tr.tier_current >= 1
    GROUP BY COALESCE(tm.kor_name, regexp_replace(tr.trait_name, '^TFT[0-9]+_?', ''))
    ORDER BY first_place_games DESC
    LIMIT 10;

  - [평균 등수 집계가 필요한 경우]
    - AVG(p.placement) AS avg_place 추가, ORDER BY avg_place ASC
